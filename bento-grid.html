<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bento Grid</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Fascinate+Inline&display=swap");
      .bento-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .bento-grid {
        max-width: 100%;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: repeat(3, 1fr);
        gap: 10px;
      }
      .grid-item {
        border-radius: 16px;
        object-fit: cover;
        height: 15rem;
      }
      .grid-item img {
        border-radius: 16px;
        height: 15rem;
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .span-2-col {
        grid-column: span 2;
      }
      .span-2-row {
        grid-row: span 2;
        height: 30.65rem;
      }
      .grid-item {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .grid-item.center {
        align-items: center;
        justify-content: center;
        background-color: rgb(192, 167, 167);
      }
      .grid-item .center-img {
        display: flex;
        height: 50%;
        width: auto;
      }
      .grid-item.center h1 {
        font-size: 3rem;
        font-family: "Fascinate Inline", system-ui;
      }
    </style>
  </head>
  <body>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="resume.html">Resume</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
    <main class="bento-wrapper">
      <section class="bento-grid">
        <div class="grid-item">
          <img
            src="./Images_Bento/tourus-teapot.png"
            alt="A blue teapot in the shape of a tourus"
          />
        </div>
        <div class="grid-item">
          <img
            src="./Images_Bento/crystal.png"
            alt="A yellow crystal glazed pot"
          />
        </div>
        <div class="grid-item span-2-col">
          <img
            src="./Images_Bento/crystal-small.png"
            alt="A small green and brown crystal pot"
          />
        </div>
        <div class="grid-item span-2-row">
          <img
            src="./Images_Bento/pot.png"
            alt="a pink and blue pot flowerpot"
          />
        </div>
        <div class="grid-item span-2-col center">
          <img
            class="center-img"
            src="./Images_Bento/ceramic-pottery-clip-art-.png"
            alt="Computer Icons Ceramic Pottery , amphora transparent background PNG clipart"
          />
          <h1>Ceramics</h1>
        </div>
        <div class="grid-item">
          <img
            src="./Images_Bento/mug-blue.png"
            alt="A blue mug with an hourglass shape"
          />
        </div>
        <div class="grid-item span-2-col">
          <img
            src="./Images_Bento/mug.png"
            alt="A blue and purple mug with a dripping design"
          />
        </div>
        <div class="grid-item">
          <img
            src="./Images_Bento/coin-jar.png"
            alt="A ceramic coin jar with a blue color"
          />
        </div>
      </section>
    </main>
  </body>
</html>
